feature: 2026-06-30-remove-worktree-flow
created: 2026-06-30

steps:
  - action: "盘点引用：用脚本名扫描和语义扫描生成分类 inventory"
    exit_signal: "命中文件已按工具源码、发布副本、hooks、tests、skills、root docs、reference 分组登记"
    status: done
  - action: "删除专属资产：移除 worktree gate、finish、inbox、branch guard、hook 及其发布副本"
    exit_signal: "被删脚本名和 hook 配置不再被非 feature 流程产物引用"
    status: done
  - action: "解耦共享工具：改写 common、doctor、validate implementation review"
    exit_signal: "工具可运行且输出不含 linked worktree / inbox / post baseline 字段"
    status: done
  - action: "改写测试：删除专属测试，更新 doctor、validate implementation review、workflow contract 测试"
    exit_signal: "测试不再导入已删除脚本，保留能力仍有回归覆盖"
    status: done
  - action: "改写流程文档：更新 README、workflow/catalog、技能和 reference"
    exit_signal: "旧 gate 命令、override、quarantine、inbox、finish、branch guard 说明消失"
    status: done
  - action: "测试与残留扫描：运行 pytest、YAML 校验、脚本名扫描、语义扫描、发布副本扫描"
    exit_signal: "测试通过，残留仅限本 feature design/checklist/review/task 产物"
    status: done

checks:
  - item: "仓库中不再存在 worktree gate / branch guard / finish worktree / inbox 工具和测试"
    source: 验收场景
    status: passed
  - item: ".codestable/tools、.codestable/hooks、.codestable/reference 发布副本已同步清理"
    source: 挂载点
    status: passed
  - item: "技能、README、reference 文档不再要求或推荐 worktree 流程"
    source: 验收场景
    status: passed
  - item: "WORKFLOW、SKILL_CATALOG、CLAUDE、AGENTS 等 root docs 不再宣传旧 worktree 执行约定"
    source: 验收场景
    status: passed
  - item: "review evidence、Task spine、YAML 校验、review packet 等非 worktree 能力保持存在"
    source: 范围守护
    status: passed
  - item: "codestable-doctor.py --json 输出不含 linked_worktree、worktree_inbox、post_baseline_blocks、ready_to_merge_worktrees 字段"
    source: 验收场景
    status: passed
  - item: "validate-implementation-review.py --json 不因当前 checkout 是否 linked worktree 阻塞"
    source: 验收场景
    status: passed
  - item: "脚本名扫描和语义扫描残留仅限本 feature design/checklist/review/task 产物"
    source: 验收场景
    status: passed
  - item: "不新增 protected-branch-guard.py 或替代 hook"
    source: 范围守护
    status: passed
  - item: "不修改 git 配置或执行 worktree 清理命令"
    source: 范围守护
    status: passed
